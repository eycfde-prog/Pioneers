<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>لوح الشرح — Pioneers</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --dark:    #080810;
  --surface: #1C1C30;
  --border:  rgba(255,255,255,0.1);
  --gold:    #F5C842;
  --green:   #4ADE80;
  --red:     #F87171;
  --blue:    #60A5FA;
  --purple:  #A78BFA;
  --text:    #EEEEf8;
  --text-dim:#8888AA;
  --font:    'Tajawal', sans-serif;
  --toolbar-h: 56px;
}

/* LIGHT THEME */
body.theme-light {
  --dark:    #F5F5FA;
  --surface: #FFFFFF;
  --border:  rgba(0,0,0,0.1);
  --text:    #1A1A2E;
  --text-dim:#666688;
  --wb-bg:   #FFFFFF;
}

body.theme-dark {
  --wb-bg: #111118;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background:  var(--dark);
  color:       var(--text);
  direction:   rtl;
  overflow:    hidden;
  height:      100vh;
  display:     flex;
  flex-direction: column;
  user-select: none;
}

/* ============================================================
   TOOLBAR
   ============================================================ */
.toolbar {
  height:      var(--toolbar-h);
  background:  var(--surface);
  border-bottom: 1px solid var(--border);
  display:     flex;
  align-items: center;
  padding:     0 12px;
  gap:         8px;
  flex-shrink: 0;
  overflow-x:  auto;
  scrollbar-width: none;
}

.toolbar::-webkit-scrollbar { display:none; }

.tool-group {
  display:     flex;
  align-items: center;
  gap:         4px;
  padding:     0 4px;
  border-right: 1px solid var(--border);
  flex-shrink: 0;
}

.tool-group:last-child { border-right:none; margin-right:auto; }

.tb-btn {
  width:       38px;
  height:      38px;
  border-radius: 8px;
  border:      1px solid var(--border);
  background:  transparent;
  color:       var(--text-dim);
  font-size:   17px;
  cursor:      pointer;
  display:     flex;
  align-items: center;
  justify-content: center;
  transition:  all .2s;
  flex-shrink: 0;
  position:    relative;
}

.tb-btn:hover  { border-color:var(--gold); color:var(--gold); background:rgba(245,200,66,.07); }
.tb-btn.active { background:var(--gold); border-color:var(--gold); color:#0a0a14; }

.tb-btn.red.active    { background:var(--red);   border-color:var(--red);   color:#fff; }
.tb-btn.blue.active   { background:var(--blue);  border-color:var(--blue);  color:#0a0a14; }
.tb-btn.green.active  { background:var(--green); border-color:var(--green); color:#0a0a14; }
.tb-btn.purple.active { background:var(--purple);border-color:var(--purple);color:#fff; }

/* Color dots in toolbar */
.tb-color {
  width:       26px;
  height:      26px;
  border-radius: 50%;
  border:      2px solid transparent;
  cursor:      pointer;
  transition:  all .2s;
  flex-shrink: 0;
}

.tb-color.active { border-color:#fff; transform:scale(1.2); }
body.theme-light .tb-color.active { border-color:#333; }

/* Size display */
.size-display {
  font-size:   11px;
  color:       var(--text-dim);
  font-family: 'Space Mono', monospace;
  min-width:   24px;
  text-align:  center;
}

/* Size range */
.size-range {
  -webkit-appearance: none;
  width:       60px;
  height:      4px;
  border-radius: 2px;
  background:  var(--border);
  outline:     none;
  cursor:      pointer;
}

.size-range::-webkit-slider-thumb {
  -webkit-appearance: none;
  width:  14px; height:14px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}

/* Text input */
.tb-text-input {
  background:  transparent;
  border:      1px solid var(--border);
  border-radius: 6px;
  padding:     4px 8px;
  font-family: var(--font);
  font-size:   13px;
  color:       var(--text);
  outline:     none;
  width:       120px;
  transition:  border-color .3s;
}

.tb-text-input:focus { border-color:var(--gold); }

/* Font size */
.tb-font-size {
  background:  transparent;
  border:      1px solid var(--border);
  border-radius: 6px;
  padding:     4px 6px;
  font-family: 'Space Mono', monospace;
  font-size:   12px;
  color:       var(--text);
  outline:     none;
  width:       50px;
  text-align:  center;
  cursor:      pointer;
}

/* Timer */
.timer-display {
  font-family: 'Space Mono', monospace;
  font-size:   14px;
  font-weight: 700;
  padding:     6px 12px;
  border-radius: 8px;
  border:      1px solid var(--border);
  background:  transparent;
  min-width:   70px;
  text-align:  center;
  cursor:      pointer;
  transition:  all .3s;
}

.timer-display.running { color:var(--green); border-color:rgba(74,222,128,.3); background:rgba(74,222,128,.07); }
.timer-display.paused  { color:var(--gold);  border-color:rgba(245,200,66,.3); }
.timer-display.stopped { color:var(--text-dim); }

/* Theme toggle */
.theme-toggle {
  font-size:   18px;
  cursor:      pointer;
}

/* ============================================================
   MAIN
   ============================================================ */
.wb-main {
  flex:        1;
  position:    relative;
  overflow:    hidden;
}

/* WHITEBOARD CANVAS */
#wb-canvas {
  position:    absolute;
  top:         0; left:0;
  cursor:      crosshair;
  touch-action: none;
}

/* CONTENT LAYER — الشرح من الـ Sheet */
#content-layer {
  position:    absolute;
  top:         0; left:0;
  pointer-events: none;
  padding:     40px;
  font-family: var(--font);
  font-size:   18px;
  line-height: 1.9;
  color:       var(--text);
  width:       100%;
}

.content-slide {
  display:     none;
  animation:   slideIn .4s ease;
}

.content-slide.active { display:block; }

@keyframes slideIn {
  from { opacity:0; transform:translateY(12px); }
  to   { opacity:1; transform:translateY(0); }
}

/* Text tool overlay */
#text-input-overlay {
  position:    absolute;
  display:     none;
  background:  transparent;
  border:      2px dashed var(--gold);
  border-radius: 4px;
  padding:     4px 8px;
  font-family: var(--font);
  color:       var(--text);
  outline:     none;
  min-width:   100px;
  resize:      both;
  overflow:    auto;
  z-index:     10;
}

/* ============================================================
   SLIDE CONTROLS
   ============================================================ */
.slide-controls {
  position:    fixed;
  bottom:      20px;
  left:        50%;
  transform:   translateX(-50%);
  display:     flex;
  align-items: center;
  gap:         12px;
  background:  rgba(8,8,16,.85);
  backdrop-filter: blur(12px);
  border:      1px solid var(--border);
  border-radius: 30px;
  padding:     8px 20px;
  z-index:     50;
}

body.theme-light .slide-controls { background:rgba(255,255,255,.9); }

.slide-btn {
  background:  none;
  border:      none;
  color:       var(--text-dim);
  font-size:   20px;
  cursor:      pointer;
  padding:     4px 8px;
  border-radius: 6px;
  transition:  all .2s;
}

.slide-btn:hover:not(:disabled) { color:var(--gold); background:rgba(245,200,66,.1); }
.slide-btn:disabled { opacity:.3; cursor:not-allowed; }

.slide-counter {
  font-family: 'Space Mono', monospace;
  font-size:   13px;
  color:       var(--text-dim);
  min-width:   60px;
  text-align:  center;
}

.slide-dots {
  display:     flex;
  gap:         5px;
}

.slide-dot {
  width:       7px; height:7px;
  border-radius: 50%;
  background:  var(--border);
  cursor:      pointer;
  transition:  all .2s;
}

.slide-dot.active {
  background:  var(--gold);
  width:       18px;
  border-radius: 3px;
}

/* ============================================================
   CONTENT PANEL (slide-in)
   ============================================================ */
.content-panel {
  position:    fixed;
  top:         var(--toolbar-h);
  right:       0;
  bottom:      0;
  width:       280px;
  background:  var(--surface);
  border-left: 1px solid var(--border);
  transform:   translateX(100%);
  transition:  transform .3s ease;
  z-index:     40;
  display:     flex;
  flex-direction: column;
  padding:     16px;
  gap:         10px;
  overflow-y:  auto;
}

.content-panel.open { transform:translateX(0); }

.cp-title { font-size:15px; font-weight:800; margin-bottom:4px; }
.cp-lesson-item {
  background:  var(--dark);
  border:      1px solid var(--border);
  border-radius: 8px;
  padding:     10px 12px;
  cursor:      pointer;
  transition:  all .25s;
  font-size:   14px;
}

.cp-lesson-item:hover   { border-color:var(--gold); }
.cp-lesson-item.active  { border-color:var(--gold); background:rgba(245,200,66,.07); color:var(--gold); }

.btn-cp-close {
  background:  none;
  border:      1px solid var(--border);
  color:       var(--text-dim);
  border-radius: 8px;
  padding:     8px;
  font-family: var(--font);
  font-size:   13px;
  cursor:      pointer;
  margin-top:  auto;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:600px) {
  .tb-text-input { width:80px; }
  .timer-display { min-width:55px; font-size:12px; }
  .slide-controls { padding:6px 14px; gap:8px; }
}
</style>
</head>
<body class="theme-dark">

<!-- TOOLBAR -->
<div class="toolbar">

  <!-- أدوات الرسم -->
  <div class="tool-group">
    <button class="tb-btn active" id="tool-pen"      onclick="setTool('pen')"      title="قلم">✏️</button>
    <button class="tb-btn"        id="tool-highlight" onclick="setTool('highlight')" title="تظليل">🖍️</button>
    <button class="tb-btn"        id="tool-line"      onclick="setTool('line')"      title="خط">📏</button>
    <button class="tb-btn"        id="tool-rect"      onclick="setTool('rect')"      title="مستطيل">⬜</button>
    <button class="tb-btn"        id="tool-circle"    onclick="setTool('circle')"    title="دايرة">⭕</button>
    <button class="tb-btn"        id="tool-arrow"     onclick="setTool('arrow')"     title="سهم">➡️</button>
    <button class="tb-btn"        id="tool-text"      onclick="setTool('text')"      title="نص">🔤</button>
    <button class="tb-btn"        id="tool-eraser"    onclick="setTool('eraser')"    title="استيكة">🧹</button>
  </div>

  <!-- ألوان -->
  <div class="tool-group">
    <div class="tb-color active" style="background:#FFFFFF" data-color="#FFFFFF" onclick="setColor('#FFFFFF',this)" title="أبيض"></div>
    <div class="tb-color" style="background:#F87171" data-color="#F87171" onclick="setColor('#F87171',this)" title="أحمر"></div>
    <div class="tb-color" style="background:#4ADE80" data-color="#4ADE80" onclick="setColor('#4ADE80',this)" title="أخضر"></div>
    <div class="tb-color" style="background:#60A5FA" data-color="#60A5FA" onclick="setColor('#60A5FA',this)" title="أزرق"></div>
    <div class="tb-color" style="background:#F5C842" data-color="#F5C842" onclick="setColor('#F5C842',this)" title="ذهبي"></div>
    <div class="tb-color" style="background:#A78BFA" data-color="#A78BFA" onclick="setColor('#A78BFA',this)" title="بنفسجي"></div>
    <div class="tb-color" style="background:#FB923C" data-color="#FB923C" onclick="setColor('#FB923C',this)" title="برتقالي"></div>
    <div class="tb-color" style="background:#000000" data-color="#000000" onclick="setColor('#000000',this)" title="أسود"></div>
  </div>

  <!-- حجم القلم -->
  <div class="tool-group">
    <span class="size-display" id="sizeDisplay">4</span>
    <input type="range" class="size-range" id="sizeRange" min="1" max="30" value="4"
           oninput="setBrushSize(this.value)">
  </div>

  <!-- نص -->
  <div class="tool-group">
    <input type="number" class="tb-font-size" id="fontSize" value="20" min="10" max="72"
           title="حجم الخط" oninput="updateFontSize(this.value)">
    <button class="tb-btn" onclick="toggleBold()" id="btn-bold" title="غامق"><b>B</b></button>
  </div>

  <!-- Undo / Redo / Clear -->
  <div class="tool-group">
    <button class="tb-btn" onclick="undo()" title="تراجع">↩️</button>
    <button class="tb-btn" onclick="redo()" title="إعادة">↪️</button>
    <button class="tb-btn red" onclick="clearBoard()" title="مسح الكل">🗑️</button>
  </div>

  <!-- محتوى الشرح -->
  <div class="tool-group">
    <button class="tb-btn" onclick="toggleContentPanel()" title="محتوى الدرس">📚</button>
  </div>

  <!-- Timer -->
  <div class="tool-group">
    <div class="timer-display stopped" id="timerDisplay" onclick="toggleTimer()">00:00</div>
    <button class="tb-btn" onclick="resetTimer()" title="إعادة">⏱</button>
  </div>

  <!-- ثيم -->
  <div class="tool-group">
    <button class="tb-btn theme-toggle" onclick="toggleTheme()" id="themeBtn" title="تغيير الثيم">🌙</button>
  </div>

</div>

<!-- MAIN -->
<div class="wb-main" id="wbMain">
  <canvas id="wb-canvas"></canvas>
  <div id="content-layer"></div>
  <textarea id="text-input-overlay" placeholder="اكتب هنا..."></textarea>
</div>

<!-- SLIDE CONTROLS -->
<div class="slide-controls" id="slideControls" style="display:none">
  <button class="slide-btn" id="prevSlide" onclick="prevSlide()" disabled>›</button>
  <div class="slide-dots" id="slideDots"></div>
  <div class="slide-counter" id="slideCounter">1 / 1</div>
  <button class="slide-btn" id="nextSlide" onclick="nextSlide()">‹</button>
</div>

<!-- CONTENT PANEL -->
<div class="content-panel" id="contentPanel">
  <div class="cp-title">📚 محتوى الدرس</div>
  <div id="cp-lessons-list"></div>
  <button class="btn-cp-close" onclick="toggleContentPanel()">إغلاق ✕</button>
</div>

<script>
// ============================================================
// STATE
// ============================================================
const API_URL = window.parent?.API_URL || 'YOUR_APPS_SCRIPT_URL_HERE';

let currentTool  = 'pen';
let currentColor = '#FFFFFF';
let brushSize    = 4;
let fontSize     = 20;
let isBold       = false;
let isDrawing    = false;
let startX = 0, startY = 0, lastX = 0, lastY = 0;
let undoStack    = [];
let redoStack    = [];
let timerInterval = null;
let timerSeconds  = 0;
let timerRunning  = false;
let currentSlide  = 0;
let slides        = [];
let savedSnap     = null; // snapshot قبل رسم الأشكال

const canvas  = document.getElementById('wb-canvas');
const ctx     = canvas.getContext('2d');
const textOverlay = document.getElementById('text-input-overlay');

// ============================================================
// RESIZE CANVAS
// ============================================================
function resizeCanvas() {
  const main = document.getElementById('wbMain');
  const snap  = undoStack.length > 0 ? ctx.getImageData(0, 0, canvas.width, canvas.height) : null;

  canvas.width  = main.clientWidth;
  canvas.height = main.clientHeight;

  // إعادة رسم الخلفية
  ctx.fillStyle = document.body.classList.contains('theme-light') ? '#FFFFFF' : '#111118';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  if (snap) ctx.putImageData(snap, 0, 0);
}

window.addEventListener('resize', resizeCanvas);
resizeCanvas();

// Fill background
function fillBg() {
  ctx.fillStyle = document.body.classList.contains('theme-light') ? '#FFFFFF' : '#111118';
  ctx.fillRect(0, 0, canvas.width, canvas.height);
}
fillBg();

// ============================================================
// TOOLS
// ============================================================
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tb-btn[id^="tool-"]').forEach(b => b.classList.remove('active'));
  document.getElementById(`tool-${tool}`)?.classList.add('active');

  const cursors = {
    pen:       'crosshair',
    highlight: 'crosshair',
    line:      'crosshair',
    rect:      'crosshair',
    circle:    'crosshair',
    arrow:     'crosshair',
    text:      'text',
    eraser:    'cell'
  };
  canvas.style.cursor = cursors[tool] || 'crosshair';

  if (tool === 'text') {
    canvas.addEventListener('click', placeTextInput, { once: true });
  }
}

function setColor(color, el) {
  currentColor = color;
  document.querySelectorAll('.tb-color').forEach(d => d.classList.remove('active'));
  el?.classList.add('active');
}

function setBrushSize(val) {
  brushSize = parseInt(val);
  document.getElementById('sizeDisplay').textContent = val;
}

function updateFontSize(val) { fontSize = parseInt(val) || 20; }

function toggleBold() {
  isBold = !isBold;
  document.getElementById('btn-bold').classList.toggle('active', isBold);
}

// ============================================================
// DRAWING
// ============================================================
canvas.addEventListener('mousedown',  e => startDraw(e.offsetX, e.offsetY));
canvas.addEventListener('mousemove',  e => { if (isDrawing) continueDraw(e.offsetX, e.offsetY); });
canvas.addEventListener('mouseup',    e => endDraw(e.offsetX, e.offsetY));
canvas.addEventListener('mouseleave', e => { if (isDrawing) endDraw(e.offsetX, e.offsetY); });

canvas.addEventListener('touchstart', e => {
  e.preventDefault();
  const pos = getTouchPos(e);
  startDraw(pos.x, pos.y);
}, { passive:false });

canvas.addEventListener('touchmove', e => {
  e.preventDefault();
  if (!isDrawing) return;
  const pos = getTouchPos(e);
  continueDraw(pos.x, pos.y);
}, { passive:false });

canvas.addEventListener('touchend', e => {
  const pos = getTouchPos(e);
  endDraw(pos.x, pos.y);
});

function getTouchPos(e) {
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches[0] || e.changedTouches[0];
  return {
    x: touch.clientX - rect.left,
    y: touch.clientY - rect.top
  };
}

function startDraw(x, y) {
  if (currentTool === 'text') return;
  isDrawing = true;
  startX = lastX = x;
  startY = lastY = y;

  // حفظ snapshot للأشكال
  if (['line','rect','circle','arrow'].includes(currentTool)) {
    savedSnap = ctx.getImageData(0, 0, canvas.width, canvas.height);
  } else {
    saveUndo();
  }

  if (currentTool === 'pen' || currentTool === 'highlight' || currentTool === 'eraser') {
    ctx.beginPath();
    ctx.moveTo(x, y);
  }
}

function continueDraw(x, y) {
  if (!isDrawing) return;

  switch (currentTool) {
    case 'pen':
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
      ctx.lineWidth   = brushSize;
      ctx.lineCap     = 'round';
      ctx.lineJoin    = 'round';
      ctx.lineTo(x, y);
      ctx.stroke();
      break;

    case 'highlight':
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = hexToRgba(currentColor, 0.35);
      ctx.lineWidth   = brushSize * 6;
      ctx.lineCap     = 'square';
      ctx.lineTo(x, y);
      ctx.stroke();
      break;

    case 'eraser':
      ctx.globalCompositeOperation = 'destination-out';
      ctx.lineWidth   = brushSize * 4;
      ctx.lineCap     = 'round';
      ctx.lineTo(x, y);
      ctx.stroke();
      break;

    case 'line':
    case 'rect':
    case 'circle':
    case 'arrow':
      // استرجع الـ snapshot وارسم الشكل الجديد
      if (savedSnap) ctx.putImageData(savedSnap, 0, 0);
      ctx.globalCompositeOperation = 'source-over';
      ctx.strokeStyle = currentColor;
      ctx.lineWidth   = brushSize;
      ctx.lineCap     = 'round';
      drawShape(currentTool, startX, startY, x, y);
      break;
  }

  lastX = x;
  lastY = y;
}

function endDraw(x, y) {
  if (!isDrawing) return;
  isDrawing = false;
  ctx.globalCompositeOperation = 'source-over';

  if (['line','rect','circle','arrow'].includes(currentTool)) {
    if (savedSnap) ctx.putImageData(savedSnap, 0, 0);
    saveUndo();
    drawShape(currentTool, startX, startY, x, y);
    savedSnap = null;
  }
}

function drawShape(type, x1, y1, x2, y2) {
  ctx.beginPath();
  switch (type) {
    case 'line':
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      break;

    case 'rect':
      ctx.strokeRect(x1, y1, x2 - x1, y2 - y1);
      break;

    case 'circle':
      const rx = Math.abs(x2 - x1) / 2;
      const ry = Math.abs(y2 - y1) / 2;
      ctx.ellipse(x1 + (x2-x1)/2, y1 + (y2-y1)/2, rx, ry, 0, 0, Math.PI * 2);
      ctx.stroke();
      break;

    case 'arrow':
      const angle  = Math.atan2(y2 - y1, x2 - x1);
      const arrowLen = 16;
      ctx.moveTo(x1, y1);
      ctx.lineTo(x2, y2);
      ctx.stroke();
      ctx.beginPath();
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - arrowLen * Math.cos(angle - Math.PI/6), y2 - arrowLen * Math.sin(angle - Math.PI/6));
      ctx.moveTo(x2, y2);
      ctx.lineTo(x2 - arrowLen * Math.cos(angle + Math.PI/6), y2 - arrowLen * Math.sin(angle + Math.PI/6));
      ctx.stroke();
      break;
  }
}

// ============================================================
// TEXT TOOL
// ============================================================
function placeTextInput(e) {
  if (currentTool !== 'text') return;
  const x = e.offsetX;
  const y = e.offsetY;

  textOverlay.style.display = 'block';
  textOverlay.style.left    = x + 'px';
  textOverlay.style.top     = y + 'px';
  textOverlay.style.color   = currentColor;
  textOverlay.style.fontSize = `${fontSize}px`;
  textOverlay.style.fontWeight = isBold ? '700' : '400';
  textOverlay.style.fontFamily = `'Tajawal', sans-serif`;
  textOverlay.value = '';
  textOverlay.focus();
}

textOverlay.addEventListener('keydown', e => {
  if (e.key === 'Escape' || (e.key === 'Enter' && !e.shiftKey)) {
    e.preventDefault();
    commitText();
  }
});

textOverlay.addEventListener('blur', commitText);

function commitText() {
  const text = textOverlay.value.trim();
  if (text) {
    const x = parseInt(textOverlay.style.left);
    const y = parseInt(textOverlay.style.top);
    saveUndo();
    ctx.globalCompositeOperation = 'source-over';
    ctx.fillStyle  = currentColor;
    ctx.font       = `${isBold?'700':'400'} ${fontSize}px Tajawal, sans-serif`;
    ctx.textAlign  = 'right';
    ctx.textBaseline = 'top';
    ctx.direction  = 'rtl';

    // كتابة متعددة الأسطر
    const lines = text.split('\n');
    lines.forEach((line, i) => {
      ctx.fillText(line, x + 200, y + i * (fontSize * 1.4));
    });
  }
  textOverlay.style.display = 'none';
  textOverlay.value = '';
}

// ============================================================
// UNDO / REDO / CLEAR
// ============================================================
function saveUndo() {
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (undoStack.length > 40) undoStack.shift();
  redoStack = [];
}

function undo() {
  if (undoStack.length === 0) return;
  redoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  ctx.putImageData(undoStack.pop(), 0, 0);
}

function redo() {
  if (redoStack.length === 0) return;
  undoStack.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  ctx.putImageData(redoStack.pop(), 0, 0);
}

function clearBoard() {
  if (!confirm('هتمسح اللوح كله؟')) return;
  saveUndo();
  fillBg();
}

// ============================================================
// THEME
// ============================================================
function toggleTheme() {
  const isLight = document.body.classList.toggle('theme-light');
  document.body.classList.toggle('theme-dark', !isLight);
  document.getElementById('themeBtn').textContent = isLight ? '🌙' : '☀️';
  localStorage.setItem('wb_theme', isLight ? 'light' : 'dark');

  // تغيير لون الخلفية في الكانفاس
  fillBg();
}

// Apply saved theme
if (localStorage.getItem('wb_theme') === 'light') toggleTheme();

// ============================================================
// TIMER
// ============================================================
function toggleTimer() {
  if (timerRunning) {
    clearInterval(timerInterval);
    timerRunning = false;
    document.getElementById('timerDisplay').className = 'timer-display paused';
  } else {
    timerRunning = true;
    document.getElementById('timerDisplay').className = 'timer-display running';
    timerInterval = setInterval(() => {
      timerSeconds++;
      updateTimerDisplay();
    }, 1000);
  }
}

function resetTimer() {
  clearInterval(timerInterval);
  timerRunning  = false;
  timerSeconds  = 0;
  updateTimerDisplay();
  document.getElementById('timerDisplay').className = 'timer-display stopped';
}

function updateTimerDisplay() {
  const m = String(Math.floor(timerSeconds / 60)).padStart(2, '0');
  const s = String(timerSeconds % 60).padStart(2, '0');
  document.getElementById('timerDisplay').textContent = `${m}:${s}`;
}

// ============================================================
// CONTENT PANEL — الشرح من الـ Sheet
// ============================================================
function toggleContentPanel() {
  document.getElementById('contentPanel').classList.toggle('open');
}

// استقبال البيانات من الأب (Pio-T-Hub)
window.addEventListener('message', e => {
  if (e.data?.type === 'loadLesson') {
    loadLesson(e.data.slides);
  }
});

// لو URL params
const params    = new URLSearchParams(window.location.search);
const teacherId = params.get('teacher_id');
const lessonId  = params.get('lesson_id');

if (teacherId && lessonId) fetchLesson(teacherId, lessonId);

async function fetchLesson(tid, lid) {
  try {
    const res  = await fetch(`${API_URL}?action=getLessons&teacher_id=${tid}`);
    const data = await res.json();
    const lesson = (data.lessons || []).find(l => l.lesson_id === lid);
    if (lesson) loadLesson(lesson.slides || []);
  } catch {}
}

function loadLesson(slideData) {
  slides       = slideData || [];
  currentSlide = 0;

  if (slides.length === 0) return;

  // بناء قايمة الدروس في الـ panel
  const list = document.getElementById('cp-lessons-list');
  list.innerHTML = slides.map((s, i) => `
    <div class="cp-lesson-item ${i===0?'active':''}" onclick="goToSlide(${i}); this.closest('.content-panel').classList.remove('open')">
      ${i+1}. ${s.content?.slice(0,40) || 'سلايد ' + (i+1)}...
    </div>`).join('');

  // عرض السلايدز
  const layer = document.getElementById('content-layer');
  layer.innerHTML = slides.map((s, i) => `
    <div class="content-slide ${i===0?'active':''}" data-slide="${i}">
      ${s.content || ''}
    </div>`).join('');

  // Slide controls
  const controls = document.getElementById('slideControls');
  controls.style.display = slides.length > 1 ? 'flex' : 'none';

  buildDots();
  updateSlideUI();
}

function buildDots() {
  const dotsEl = document.getElementById('slideDots');
  dotsEl.innerHTML = slides.slice(0, 10).map((_, i) => `
    <div class="slide-dot ${i===0?'active':''}" onclick="goToSlide(${i})"></div>`).join('');
}

function goToSlide(index) {
  if (index < 0 || index >= slides.length) return;
  currentSlide = index;
  updateSlideUI();
  clearBoard();
}

function prevSlide() { goToSlide(currentSlide - 1); }
function nextSlide() { goToSlide(currentSlide + 1); }

function updateSlideUI() {
  document.querySelectorAll('.content-slide').forEach((el, i) =>
    el.classList.toggle('active', i === currentSlide));

  document.querySelectorAll('.slide-dot').forEach((el, i) =>
    el.classList.toggle('active', i === currentSlide));

  document.querySelectorAll('.cp-lesson-item').forEach((el, i) =>
    el.classList.toggle('active', i === currentSlide));

  document.getElementById('slideCounter').textContent =
    `${currentSlide + 1} / ${slides.length}`;

  document.getElementById('prevSlide').disabled = currentSlide === 0;
  document.getElementById('nextSlide').disabled = currentSlide === slides.length - 1;
}

// Keyboard shortcuts
document.addEventListener('keydown', e => {
  if (e.target === textOverlay) return;
  if (e.key === 'ArrowLeft')  nextSlide();
  if (e.key === 'ArrowRight') prevSlide();
  if (e.key === 'z' && (e.ctrlKey || e.metaKey)) undo();
  if (e.key === 'y' && (e.ctrlKey || e.metaKey)) redo();
  if (e.key === 'Delete' && e.shiftKey) clearBoard();
});

// ============================================================
// HELPERS
// ============================================================
function hexToRgba(hex, alpha) {
  const r = parseInt(hex.slice(1,3), 16);
  const g = parseInt(hex.slice(3,5), 16);
  const b = parseInt(hex.slice(5,7), 16);
  return `rgba(${r},${g},${b},${alpha})`;
}
