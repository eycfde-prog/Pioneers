<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>تصحيح الإجابات — Pioneers</title>
<link href="https://fonts.googleapis.com/css2?family=Tajawal:wght@400;700;800&family=Space+Mono&display=swap" rel="stylesheet">
<style>
:root {
  --dark:    #080810;
  --surface: #1C1C30;
  --border:  rgba(255,255,255,0.1);
  --gold:    #F5C842;
  --green:   #4ADE80;
  --red:     #F87171;
  --blue:    #60A5FA;
  --text:    #EEEEf8;
  --text-dim:#8888AA;
  --font:    'Tajawal', sans-serif;
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }

body {
  font-family: var(--font);
  background:  var(--dark);
  color:       var(--text);
  direction:   rtl;
  overflow:    hidden;
  height:      100vh;
  display:     flex;
  flex-direction: column;
}

/* ============================================================
   HEADER
   ============================================================ */
.corrector-header {
  height:      52px;
  background:  var(--surface);
  border-bottom: 1px solid var(--border);
  display:     flex;
  align-items: center;
  padding:     0 16px;
  gap:         12px;
  flex-shrink: 0;
}

.header-title {
  font-size:   15px;
  font-weight: 800;
  color:       var(--gold);
  flex:        1;
}

.header-student {
  font-size:   13px;
  color:       var(--text-dim);
}

.btn-header {
  background:  var(--dark);
  border:      1px solid var(--border);
  color:       var(--text-dim);
  padding:     6px 12px;
  border-radius: 6px;
  font-family: var(--font);
  font-size:   12px;
  cursor:      pointer;
  transition:  all .2s;
  white-space: nowrap;
}

.btn-header:hover { border-color:var(--gold); color:var(--gold); }
.btn-header.save  { background:var(--green); border-color:var(--green); color:#0a0a14; font-weight:700; }
.btn-header.save:hover { opacity:.9; }

/* ============================================================
   MAIN LAYOUT
   ============================================================ */
.corrector-body {
  flex:        1;
  display:     flex;
  overflow:    hidden;
}

/* TOOLS PANEL */
.tools-panel {
  width:       64px;
  background:  var(--surface);
  border-left: 1px solid var(--border);
  display:     flex;
  flex-direction: column;
  align-items: center;
  padding:     12px 0;
  gap:         6px;
  flex-shrink: 0;
  overflow-y:  auto;
}

.tool-btn {
  width:       44px;
  height:      44px;
  border-radius: 10px;
  border:      1px solid var(--border);
  background:  var(--dark);
  color:       var(--text-dim);
  font-size:   20px;
  cursor:      pointer;
  display:     flex;
  align-items: center;
  justify-content: center;
  transition:  all .2s;
  position:    relative;
}

.tool-btn:hover   { border-color:var(--gold); color:var(--gold); }
.tool-btn.active  { background:var(--gold); border-color:var(--gold); color:#0a0a14; }
.tool-btn.red.active    { background:var(--red);   border-color:var(--red);   color:#fff; }
.tool-btn.green.active  { background:var(--green); border-color:var(--green); color:#0a0a14; }
.tool-btn.blue.active   { background:var(--blue);  border-color:var(--blue);  color:#0a0a14; }

.tool-separator {
  width:       32px;
  height:      1px;
  background:  var(--border);
  margin:      4px 0;
}

/* Color picker */
.color-dot {
  width:       28px;
  height:      28px;
  border-radius: 50%;
  border:      2px solid transparent;
  cursor:      pointer;
  transition:  all .2s;
}

.color-dot.active { border-color: #fff; transform: scale(1.15); }

/* Size slider */
.size-wrap {
  display:     flex;
  flex-direction: column;
  align-items: center;
  gap:         4px;
  padding:     4px 0;
}

.size-label { font-size:9px; color:var(--text-dim); }

.size-slider {
  -webkit-appearance: none;
  width:       40px;
  height:      80px;
  writing-mode: vertical-lr;
  direction:   rtl;
  background:  var(--dark);
  outline:     none;
  border-radius: 4px;
}

.size-slider::-webkit-slider-thumb {
  -webkit-appearance: none;
  width:  14px;
  height: 14px;
  border-radius: 50%;
  background: var(--gold);
  cursor: pointer;
}

/* CANVAS AREA */
.canvas-area {
  flex:        1;
  position:    relative;
  overflow:    auto;
  background:  #111118;
  display:     flex;
  align-items: flex-start;
  justify-content: center;
  padding:     20px;
}

.canvas-wrap {
  position:    relative;
  display:     inline-block;
}

#bg-image {
  display:     block;
  max-width:   100%;
  user-select: none;
  pointer-events: none;
}

#draw-canvas {
  position:    absolute;
  top:         0;
  left:        0;
  cursor:      crosshair;
}

/* No image state */
.no-image-state {
  display:     flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  height:      100%;
  color:       var(--text-dim);
  gap:         16px;
  width:       100%;
}

.no-image-state .icon { font-size: 56px; }
.no-image-state p     { font-size: 16px; }

/* SIDE PANEL — درجة وتعليق */
.side-panel {
  width:       260px;
  background:  var(--surface);
  border-left: 1px solid var(--border);
  display:     flex;
  flex-direction: column;
  padding:     16px;
  gap:         16px;
  flex-shrink: 0;
  overflow-y:  auto;
}

.side-section { display:flex; flex-direction:column; gap:8px; }
.side-label {
  font-size:   12px;
  font-weight: 700;
  color:       var(--text-dim);
  text-transform: uppercase;
  letter-spacing: 1px;
}

/* Degree input */
.degree-row {
  display:     flex;
  align-items: center;
  gap:         8px;
}

.degree-input {
  width:       70px;
  background:  var(--dark);
  border:      1px solid var(--border);
  border-radius: 8px;
  padding:     10px;
  font-family: 'Space Mono', monospace;
  font-size:   20px;
  font-weight: 700;
  color:       var(--gold);
  text-align:  center;
  outline:     none;
  transition:  border-color .3s;
}

.degree-input:focus { border-color:var(--gold); }

.degree-sep {
  font-size:   20px;
  color:       var(--text-dim);
  font-family: 'Space Mono', monospace;
}

.degree-total {
  width:       70px;
  background:  var(--dark);
  border:      1px solid var(--border);
  border-radius: 8px;
  padding:     10px;
  font-family: 'Space Mono', monospace;
  font-size:   20px;
  font-weight: 700;
  color:       var(--text-dim);
  text-align:  center;
  outline:     none;
  transition:  border-color .3s;
}

.degree-total:focus { border-color:var(--text-dim); }

/* Stamp degree */
.btn-stamp-degree {
  background:  rgba(245,200,66,.1);
  border:      1px solid rgba(245,200,66,.2);
  color:       var(--gold);
  padding:     9px;
  border-radius: 8px;
  font-family: var(--font);
  font-size:   13px;
  font-weight: 700;
  cursor:      pointer;
  transition:  all .25s;
  width:       100%;
}

.btn-stamp-degree:hover { background:rgba(245,200,66,.18); }

/* Comment */
.comment-textarea {
  background:  var(--dark);
  border:      1px solid var(--border);
  border-radius: 8px;
  padding:     10px;
  font-family: var(--font);
  font-size:   13px;
  color:       var(--text);
  resize:      none;
  height:      100px;
  outline:     none;
  transition:  border-color .3s;
  text-align:  right;
  direction:   rtl;
  line-height: 1.7;
}

.comment-textarea:focus { border-color:var(--gold); }

.comment-note {
  font-size:   11px;
  color:       var(--text-dim);
  line-height: 1.6;
  background:  rgba(245,200,66,.05);
  border:      1px solid rgba(245,200,66,.1);
  border-radius: 6px;
  padding:     8px 10px;
}

/* Answers list */
.answers-list {
  display:     flex;
  flex-direction: column;
  gap:         6px;
}

.answer-item {
  background:  var(--dark);
  border:      1px solid var(--border);
  border-radius: 8px;
  padding:     8px 10px;
  cursor:      pointer;
  transition:  all .25s;
  display:     flex;
  align-items: center;
  gap:         8px;
  font-size:   12px;
}

.answer-item:hover  { border-color:var(--gold); }
.answer-item.active { border-color:var(--gold); background:rgba(245,200,66,.07); }

.answer-thumb {
  width:       40px;
  height:      40px;
  border-radius: 6px;
  object-fit:  cover;
  flex-shrink: 0;
}

.answer-info { flex:1; overflow:hidden; }
.answer-name { font-size:12px; font-weight:700; white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }
.answer-meta { font-size:10px; color:var(--text-dim); }

/* Saved indicator */
.saved-indicator {
  font-size:   12px;
  color:       var(--green);
  text-align:  center;
  padding:     6px;
  background:  rgba(74,222,128,.08);
  border-radius: 6px;
  border:      1px solid rgba(74,222,128,.2);
  display:     none;
}

/* Empty state */
.side-empty {
  text-align:  center;
  padding:     20px 0;
  color:       var(--text-dim);
  font-size:   13px;
}

/* ============================================================
   RESPONSIVE
   ============================================================ */
@media (max-width:768px) {
  .side-panel   { display:none; }
  .tools-panel  { width:48px; }
  .tool-btn     { width:36px; height:36px; font-size:16px; }
}
</style>
</head>
<body>

<!-- HEADER -->
<div class="corrector-header">
  <div class="header-title">✏️ تصحيح الإجابات</div>
  <div class="header-student" id="headerStudent">اختار إجابة من القايمة</div>
  <button class="btn-header" onclick="undoLast()">↩️ تراجع</button>
  <button class="btn-header" onclick="clearCanvas()">🗑️ مسح الكل</button>
  <button class="btn-header save" onclick="saveCorrection()">💾 حفظ التصحيح</button>
</div>

<!-- BODY -->
<div class="corrector-body">

  <!-- TOOLS -->
  <div class="tools-panel">
    <!-- أدوات الرسم -->
    <button class="tool-btn active" id="tool-pen" onclick="setTool('pen')" title="قلم">✏️</button>
    <button class="tool-btn"        id="tool-eraser" onclick="setTool('eraser')" title="استيكة">🧹</button>
    <div class="tool-separator"></div>

    <!-- علامات -->
    <button class="tool-btn green" id="tool-check" onclick="setTool('check')" title="صح">✅</button>
    <button class="tool-btn red"   id="tool-cross" onclick="setTool('cross')" title="غلط">❌</button>
    <div class="tool-separator"></div>

    <!-- ألوان -->
    <div class="color-dot active" style="background:#F87171" data-color="#F87171" onclick="setColor('#F87171',this)" title="أحمر"></div>
    <div class="color-dot" style="background:#4ADE80" data-color="#4ADE80" onclick="setColor('#4ADE80',this)" title="أخضر"></div>
    <div class="color-dot" style="background:#60A5FA" data-color="#60A5FA" onclick="setColor('#60A5FA',this)" title="أزرق"></div>
    <div class="color-dot" style="background:#F5C842" data-color="#F5C842" onclick="setColor('#F5C842',this)" title="ذهبي"></div>
    <div class="color-dot" style="background:#A78BFA" data-color="#A78BFA" onclick="setColor('#A78BFA',this)" title="بنفسجي"></div>
    <div class="tool-separator"></div>

    <!-- حجم القلم -->
    <div class="size-wrap">
      <div class="size-label">حجم</div>
      <input type="range" class="size-slider" id="sizeSlider" min="2" max="24" value="4"
             oninput="setBrushSize(this.value)">
    </div>
  </div>

  <!-- CANVAS -->
  <div class="canvas-area" id="canvasArea">
    <div class="no-image-state" id="noImageState">
      <div class="icon">🖼️</div>
      <p>اختار إجابة طالب من القايمة</p>
    </div>
    <div class="canvas-wrap" id="canvasWrap" style="display:none">
      <img id="bg-image" alt="إجابة الطالب">
      <canvas id="draw-canvas"></canvas>
    </div>
  </div>

  <!-- SIDE PANEL -->
  <div class="side-panel">

    <!-- قايمة الإجابات -->
    <div class="side-section">
      <div class="side-label">📋 إجابات الطلاب</div>
      <div class="answers-list" id="answersList">
        <div class="side-empty">جاري التحميل...</div>
      </div>
    </div>

    <!-- الدرجة -->
    <div class="side-section">
      <div class="side-label">🔢 الدرجة</div>
      <div class="degree-row">
        <input type="number" class="degree-input" id="degreeInput" min="0" placeholder="0">
        <span class="degree-sep">/</span>
        <input type="number" class="degree-total" id="degreeTotalInput" placeholder="10">
      </div>
      <button class="btn-stamp-degree" onclick="stampDegree()">
        🖊️ اطبع الدرجة على الصفحة
      </button>
    </div>

    <!-- تعليق للإدارة -->
    <div class="side-section">
      <div class="side-label">💬 تعليق للإدارة</div>
      <textarea class="comment-textarea" id="commentInput"
                placeholder="اكتب سبب الدرجة هنا..."></textarea>
      <div class="comment-note">
        ⚠️ التعليق ده للإدارة بس — مش بيوصل للطالب<br>
        اكتب تفسير مبسط لسبب الدرجة
      </div>
    </div>

    <!-- حفظ -->
    <div class="side-section">
      <button class="btn-stamp-degree" style="background:rgba(74,222,128,.1);border-color:rgba(74,222,128,.2);color:var(--green)"
              onclick="saveCorrection()">
        💾 حفظ التصحيح
      </button>
      <div class="saved-indicator" id="savedIndicator">✅ تم الحفظ بنجاح!</div>
    </div>

  </div>

</div>

<script>
// ============================================================
// STATE
// ============================================================
const API_URL = window.parent?.API_URL || 'YOUR_APPS_SCRIPT_URL_HERE';

let currentTool  = 'pen';
let currentColor = '#F87171';
let brushSize    = 4;
let isDrawing    = false;
let lastX = 0, lastY = 0;
let history      = [];   // للـ undo
let currentAnswer = null; // الإجابة الحالية

const canvas = document.getElementById('draw-canvas');
const ctx    = canvas.getContext('2d');
const bgImg  = document.getElementById('bg-image');

// ============================================================
// LOAD ANSWERS — بيستقبل البيانات من الأب
// ============================================================
window.addEventListener('message', (e) => {
  if (e.data?.type === 'loadAnswers') {
    loadAnswers(e.data.answers);
  }
});

// لو اتفتح مباشرة — نجيب الإجابات من الـ URL params
const params     = new URLSearchParams(window.location.search);
const teacherId  = params.get('teacher_id');
const examName   = params.get('exam_name');

if (teacherId && examName) {
  fetchAnswers(teacherId, examName);
}

async function fetchAnswers(teacherId, examName) {
  try {
    const res  = await fetch(`${API_URL}?action=getStudentAnswers&teacher_id=${teacherId}&exam_name=${encodeURIComponent(examName)}`);
    const data = await res.json();
    loadAnswers(data.answers || []);
  } catch {
    document.getElementById('answersList').innerHTML =
      '<div class="side-empty">تعذّر تحميل الإجابات</div>';
  }
}

function loadAnswers(answers) {
  const list = document.getElementById('answersList');
  if (!answers?.length) {
    list.innerHTML = '<div class="side-empty">مفيش إجابات لسه</div>';
    return;
  }

  list.innerHTML = answers.map((ans, i) => `
    <div class="answer-item" data-index="${i}" onclick="selectAnswer(${i})">
      <img class="answer-thumb" src="${ans.photo_url}" alt="${ans.student_name}"
           onerror="this.style.display='none'">
      <div class="answer-info">
        <div class="answer-name">${ans.student_name}</div>
        <div class="answer-meta">${ans.grade} — ${ans.answer_num || 'إجابة'}</div>
      </div>
    </div>`).join('');

  window._answers = answers;
}

function selectAnswer(index) {
  const ans = window._answers?.[index];
  if (!ans) return;

  currentAnswer = ans;

  // تحديث الـ UI
  document.querySelectorAll('.answer-item').forEach((el, i) =>
    el.classList.toggle('active', i === index));

  document.getElementById('headerStudent').textContent =
    `${ans.student_name} — ${ans.grade}`;

  // تحميل الصورة
  document.getElementById('noImageState').style.display  = 'none';
  document.getElementById('canvasWrap').style.display    = 'block';

  bgImg.onload = () => resizeCanvas();
  bgImg.src    = ans.photo_url;

  // مسح الكانفاس
  clearCanvas(false);

  // لو في تصحيح محفوظ — نحمّله
  if (ans.correction_url) {
    loadSavedCorrection(ans.correction_url);
  }

  // الدرجة القديمة
  if (ans.degree) {
    const parts = ans.degree.split('/');
    document.getElementById('degreeInput').value      = parts[0] || '';
    document.getElementById('degreeTotalInput').value = parts[1] || '';
  } else {
    document.getElementById('degreeInput').value      = '';
    document.getElementById('degreeTotalInput').value = '';
  }

  document.getElementById('commentInput').value = ans.comment || '';
}

function resizeCanvas() {
  canvas.width  = bgImg.naturalWidth  || bgImg.width;
  canvas.height = bgImg.naturalHeight || bgImg.height;
  canvas.style.width  = bgImg.width  + 'px';
  canvas.style.height = bgImg.height + 'px';
}

function loadSavedCorrection(url) {
  const img = new Image();
  img.crossOrigin = 'anonymous';
  img.onload = () => ctx.drawImage(img, 0, 0);
  img.src    = url;
}

// ============================================================
// TOOLS
// ============================================================
function setTool(tool) {
  currentTool = tool;
  document.querySelectorAll('.tool-btn').forEach(b => b.classList.remove('active'));
  document.getElementById(`tool-${tool}`)?.classList.add('active');

  canvas.style.cursor = tool === 'eraser' ? 'cell' :
                        tool === 'check' || tool === 'cross' ? 'copy' : 'crosshair';
}

function setColor(color, el) {
  currentColor = color;
  document.querySelectorAll('.color-dot').forEach(d => d.classList.remove('active'));
  el?.classList.add('active');
  if (currentTool !== 'eraser') setTool('pen');
}

function setBrushSize(val) {
  brushSize = parseInt(val);
}

// ============================================================
// DRAWING
// ============================================================
canvas.addEventListener('mousedown',  startDraw);
canvas.addEventListener('mousemove',  draw);
canvas.addEventListener('mouseup',    endDraw);
canvas.addEventListener('mouseleave', endDraw);

canvas.addEventListener('touchstart',  e => { e.preventDefault(); startDraw(getTouchPos(e)); }, { passive:false });
canvas.addEventListener('touchmove',   e => { e.preventDefault(); draw(getTouchPos(e)); },      { passive:false });
canvas.addEventListener('touchend',    endDraw);

function getTouchPos(e) {
  const rect  = canvas.getBoundingClientRect();
  const touch = e.touches[0] || e.changedTouches[0];
  const scaleX = canvas.width  / rect.width;
  const scaleY = canvas.height / rect.height;
  return {
    offsetX: (touch.clientX - rect.left) * scaleX,
    offsetY: (touch.clientY - rect.top)  * scaleY
  };
}

function startDraw(e) {
  if (!currentAnswer) return;
  isDrawing = true;
  lastX = e.offsetX || 0;
  lastY = e.offsetY || 0;

  if (currentTool === 'check' || currentTool === 'cross') {
    drawStamp(lastX, lastY);
    saveHistory();
    isDrawing = false;
    return;
  }

  saveHistory();
}

function draw(e) {
  if (!isDrawing || !currentAnswer) return;
  const x = e.offsetX || 0;
  const y = e.offsetY || 0;

  ctx.beginPath();
  ctx.moveTo(lastX, lastY);
  ctx.lineTo(x, y);

  if (currentTool === 'eraser') {
    ctx.globalCompositeOperation = 'destination-out';
    ctx.lineWidth   = brushSize * 4;
    ctx.strokeStyle = 'rgba(0,0,0,1)';
  } else {
    ctx.globalCompositeOperation = 'source-over';
    ctx.strokeStyle = currentColor;
    ctx.lineWidth   = brushSize;
    ctx.lineCap     = 'round';
    ctx.lineJoin    = 'round';
  }

  ctx.stroke();
  lastX = x;
  lastY = y;
}

function endDraw() {
  if (isDrawing) {
    ctx.globalCompositeOperation = 'source-over';
  }
  isDrawing = false;
}

function drawStamp(x, y) {
  const size = 32;
  ctx.font      = `${size}px Arial`;
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.globalCompositeOperation = 'source-over';
  ctx.fillText(currentTool === 'check' ? '✓' : '✗', x, y);

  // دايرة حول العلامة
  ctx.strokeStyle = currentTool === 'check' ? '#4ADE80' : '#F87171';
  ctx.lineWidth   = 2;
  ctx.beginPath();
  ctx.arc(x, y, size * 0.7, 0, Math.PI * 2);
  ctx.stroke();
}

// ============================================================
// STAMP DEGREE — طباعة الدرجة على الصفحة
// ============================================================
function stampDegree() {
  const deg   = document.getElementById('degreeInput').value;
  const total = document.getElementById('degreeTotalInput').value;
  if (!deg || !total || !currentAnswer) return;

  const text  = `${deg}/${total}`;
  const x     = canvas.width  * 0.08;
  const y     = canvas.height * 0.06;
  const r     = 52;

  ctx.globalCompositeOperation = 'source-over';

  // دايرة حمرا بخط عريض
  ctx.beginPath();
  ctx.arc(x, y, r, 0, Math.PI * 2);
  ctx.fillStyle   = 'rgba(248,113,113,0.15)';
  ctx.fill();
  ctx.strokeStyle = '#F87171';
  ctx.lineWidth   = 3;
  ctx.stroke();

  // النص
  ctx.font         = `bold ${r * 0.7}px 'Space Mono', monospace`;
  ctx.fillStyle    = '#F87171';
  ctx.textAlign    = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText(text, x, y);

  saveHistory();
}

// ============================================================
// UNDO / CLEAR
// ============================================================
function saveHistory() {
  history.push(ctx.getImageData(0, 0, canvas.width, canvas.height));
  if (history.length > 30) history.shift();
}

function undoLast() {
  if (history.length === 0) return;
  ctx.putImageData(history.pop(), 0, 0);
}

function clearCanvas(saveHist = true) {
  if (saveHist) saveHistory();
  ctx.clearRect(0, 0, canvas.width, canvas.height);
}

// ============================================================
// SAVE CORRECTION
// ============================================================
async function saveCorrection() {
  if (!currentAnswer) {
    alert('اختار إجابة طالب الأول');
    return;
  }

  const degree  = document.getElementById('degreeInput').value;
  const total   = document.getElementById('degreeTotalInput').value;
  const comment = document.getElementById('commentInput').value.trim();

  if (!degree || !total) {
    alert('ادخل الدرجة الأول');
    return;
  }

  // دمج صورة الخلفية مع التصحيح
  const merged = document.createElement('canvas');
  merged.width  = canvas.width;
  merged.height = canvas.height;
  const mctx   = merged.getContext('2d');

  // ارسم الصورة الأصلية
  mctx.drawImage(bgImg, 0, 0, canvas.width, canvas.height);
  // ارسم التصحيح فوقها
  mctx.drawImage(canvas, 0, 0);

  const dataUrl  = merged.toDataURL('image/jpeg', 0.85);
  const base64   = dataUrl.split(',')[1];

  try {
    const res  = await fetch(API_URL, {
      method: 'POST',
      body:   JSON.stringify({
        action:      'saveCorrectedAnswer',
        teacher_id:  teacherId || currentAnswer.teacher_id,
        student_id:  currentAnswer.student_id,
        exam_name:   examName  || currentAnswer.exam_name,
        degree:      `${degree}/${total}`,
        comment,
        image_base64: base64,
        file_name:   `corrected_${currentAnswer.student_id}_${currentAnswer.exam_name}.jpg`
      })
    });

    const data = await res.json();

    if (data.success) {
      const indicator = document.getElementById('savedIndicator');
      indicator.style.display = 'block';
      setTimeout(() => indicator.style.display = 'none', 3000);

      // إبلاغ الصفحة الأم
      window.parent?.postMessage({
        type:       'correctionSaved',
        student_id: currentAnswer.student_id,
        degree:     `${degree}/${total}`
      }, '*');
    }
  } catch {
    alert('تعذّر الحفظ — حاول تاني');
  }
}

// ============================================================
// RESIZE
// ============================================================
window.addEventListener('resize', () => {
  if (currentAnswer) {
    const savedData = ctx.getImageData(0, 0, canvas.width, canvas.height);
    resizeCanvas();
    ctx.putImageData(savedData, 0, 0);
  }
});
</script>
